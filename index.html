<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workout Log</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        h2 { text-align: center; color: var(--primary-color); }
        
        /* Login Style */
        #login-section { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px; border: none; background: var(--primary-color); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        /* Calendar Style */
        #main-section { display: none; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #eee; border-radius: 8px; cursor: pointer; font-size: 0.8rem; position: relative; }
        .day.completed { background: #d1d8ff; border: 2px solid var(--primary-color); }
        .day:hover { background: #e0e0e0; }

        /* Modal Style */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 300px; }
        .exercise-item { display: flex; justify-content: space-between; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>🔒 Workout Login</h2>
        <input type="text" id="username" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
    </div>

    <div id="main-section">
        <div class="calendar-header">
            <h3 id="month-title">2026년 4월</h3>
            <button onclick="logout()" style="padding: 5px 10px; background: #ff7675;">로그아웃</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 15px; text-align: center;">날짜를 클릭해 운동을 기록하세요!</p>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h4 id="modal-date">날짜</h4>
        <div class="exercise-item"><span>💪 팔굽혀펴기 50회</span> <input type="checkbox" id="ex1"></div>
        <div class="exercise-item"><span>🪜 계단오르기</span> <input type="checkbox" id="ex2"></div>
        <div class="exercise-item"><span>🏃 러닝 5km</span> <input type="checkbox" id="ex3"></div>
        <div class="exercise-item"><span>🏋️ 스쿼트 50회</span> <input type="checkbox" id="ex4"></div>
        <button onclick="saveExercise()" style="width: 100%; margin-top: 10px;">저장하기</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 5px; background: #ccc;">닫기</button>
    </div>
</div>

<script>
    let selectedDate = '';
    const workoutData = JSON.parse(localStorage.getItem('workoutData')) || {};

    function login() {
        const id = document.getElementById('username').value;
        const pw = document.getElementById('password').value;
        if(id === 'user' && pw === 'userpass') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            renderCalendar();
        } else {
            alert('아이디 또는 비밀번호가 틀렸습니다!');
        }
    }

    function logout() {
        location.reload();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        
        document.getElementById('month-title').innerText = `${year}년 ${month + 1}월`;

        const lastDay = new Date(year, month + 1, 0).getDate();

        for (let i = 1; i <= lastDay; i++) {
            const dateStr = `${year}-${month + 1}-${i}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            if (workoutData[dateStr] && Object.values(workoutData[dateStr]).every(v => v)) {
                dayEl.classList.add('completed');
            }
            dayEl.innerText = i;
            dayEl.onclick = () => openModal(dateStr);
            grid.appendChild(dayEl);
        }
    }

    function openModal(date) {
        selectedDate = date;
        document.getElementById('modal-date').innerText = date;
        const data = workoutData[date] || {ex1: false, ex2: false, ex3: false, ex4: false};
        document.getElementById('ex1').checked = data.ex1;
        document.getElementById('ex2').checked = data.ex2;
        document.getElementById('ex3').checked = data.ex3;
        document.getElementById('ex4').checked = data.ex4;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function saveExercise() {
        workoutData[selectedDate] = {
            ex1: document.getElementById('ex1').checked,
            ex2: document.getElementById('ex2').checked,
            ex3: document.getElementById('ex3').checked,
            ex4: document.getElementById('ex4').checked
        };
        localStorage.setItem('workoutData', JSON.stringify(workoutData));
        closeModal();
        renderCalendar();
    }
</script>

</body>
</html>
